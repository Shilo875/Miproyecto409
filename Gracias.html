<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>¡Gracias!</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    background:#0d1117;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.contenedor{
    background:white;
    padding:40px;
    border-radius:20px;
    text-align:center;
    width:90%;
    max-width:500px;
    box-shadow:0 10px 30px rgba(0,0,0,.3);
}

h1{
    color:#2e7d32;
    margin-bottom:15px;
}

p{
    color:#555;
    margin-bottom:25px;
    font-size:18px;
}

a{
    display:inline-block;
    padding:12px 25px;
    background:#2e7d32;
    color:white;
    text-decoration:none;
    border-radius:10px;
    font-weight:bold;
    transition:.3s;
}

a:hover{
    background:#1b5e20;
}
</style>

</head>

<body>

<div class="contenedor">
    <h1>🌱 ¡Gracias por tu mensaje!</h1>
    <p>Tu información se envió correctamente. Gracias por apoyar nuestro proyecto de reciclaje de unicel del CECyTEM.</p>

    <a href="index.html">Volver al inicio</a>
</div>
